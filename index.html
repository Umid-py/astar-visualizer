<!DOCTYPE html>
<html lang="uz">
<head>
<meta charset="UTF-8">
<title>A* Visualizer</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<header>
  <h1>A* Pathfinding Visualizer</h1>
</header>

<div class="panel">

  <div class="controls">
    <button onclick="startSearch()">▶ Start (Space)</button>
    <button onclick="clearBoard()">🧹 Clear (C)</button>
    <button onclick="randomMaze()">🎲 Maze (R)</button>
  </div>

  <div class="stats">
    <div>⏱ Time: <span id="time">0</span> ms</div>
    <div>📦 Visited: <span id="visited">0</span></div>
    <div>🛣 Path: <span id="path">0</span></div>
    <div>⚡ FPS: <span id="fps">0</span></div>
  </div>

</div>

<div id="grid"></div>

<script src="script.js"></script>
</body>
</html>
